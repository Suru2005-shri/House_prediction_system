project:
  name: "House Price Prediction"
  version: "2.0"
  description: "End-to-end ML pipeline with tuning, SHAP, stacking & web app"

data:
  n_samples: 2000
  random_state: 42
  test_size: 0.20
  target_column: "price_usd"
  output_dir: "data"

models:
  random_state: 42

  linear_regression:
    fit_intercept: true

  decision_tree:
    max_depth: 8
    min_samples_split: 10
    min_samples_leaf: 5

  random_forest:
    n_estimators: 200
    max_depth: 12
    min_samples_split: 5
    min_samples_leaf: 2
    n_jobs: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

tuning:
  cv_folds: 5
  n_iter: 40              # RandomizedSearchCV iterations
  scoring: "r2"
  n_jobs: -1

  random_forest_grid:
    n_estimators: [100, 200, 300, 500]
    max_depth: [6, 8, 10, 12, 15, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    max_features: ["sqrt", "log2", 0.5]

  xgboost_grid:
    n_estimators: [100, 200, 300, 500]
    learning_rate: [0.01, 0.05, 0.1, 0.2]
    max_depth: [3, 4, 5, 6, 8]
    subsample: [0.6, 0.7, 0.8, 0.9, 1.0]
    colsample_bytree: [0.6, 0.7, 0.8, 0.9, 1.0]
    reg_alpha: [0, 0.1, 0.5, 1.0]
    reg_lambda: [0.5, 1.0, 2.0]

stacking:
  cv_folds: 5
  final_estimator: "ridge"   # ridge | lasso | linear

shap:
  max_display: 16
  n_samples: 200             # samples used for SHAP background

output:
  plots_dir: "outputs"
  models_dir: "models"
  logs_dir: "logs"

paths:
  raw_data: "data/housing_data.csv"
  engineered_data: "data/housing_engineered.csv"
  best_model: "models/best_model.pkl"
  stacked_model: "models/stacked_model.pkl"
  scaler: "models/scaler.pkl"
  feature_names: "models/feature_names.pkl"
